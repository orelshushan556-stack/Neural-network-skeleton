name: Generate AI Documentation
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PDF Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended

      - name: Generate Project Report
        run: |
          mkdir -p docs
          cat <<EOF > docs/Architecture_Report.md
          # Neural Network Project - Technical Documentation
          
          ## 1. Matrix Engine (Matrix.h)
          - **Memory Management**: Implements Deep Copy, Destructors, and Move semantics (O(1)) for performance.
          - **Linear Algebra**: Supports Matrix Multiplication, Hadamard products, and Scalar operations.
          - **Activations**: Built-in ReLU and ReLU Derivative for backpropagation.
          
          ## 2. Neural Layer (Layer.h)
          - **Weights/Bias**: Uses Xavier-style initialization (1/sqrt) for stable gradients.
          - **Forward Pass**: Efficient matrix transformation with integrated activation.
          
          ## 3. Network Architecture (Network.h)
          - **Dynamic Sizing**: Supports custom layer configurations.
          - **Algorithm**: Structured for Feedforward and Backpropagation training cycles.
          EOF

      - name: Convert MD to PDF
        run: |
          pandoc docs/Architecture_Report.md -o docs/Project_Documentation.pdf

      - name: Push PDF Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/Project_Documentation.pdf
          git commit -m "Automated update: Professional Architecture PDF" || echo "No changes"
          git push
