name: Generate AI Documentation
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Analyze Code with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Scanning source files in NeuralNet_Foundation..."
          # The robot is now looking at Matrix.h, Layer.h, and Network.h
          
      - name: Generate PDF Documentation
        run: |
          mkdir -p docs
          echo "Converting analysis to PDF format..."

      - name: Push Documentation to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/*.pdf || echo "No PDF files found"
          git commit -m "Update technical documentation (Automated)" || echo "No changes to commit"
          git push
