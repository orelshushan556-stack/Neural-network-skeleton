name: Generate AI Documentation
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PDF & Doc Tools
        run: |
          sudo apt-get update
          # הוספת lmodern ו-texlive-latex-recommended פותרת את השגיאות האחרונות
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            lmodern

      - name: Generate Technical Report
        run: |
          mkdir -p docs
          cat <<EOF > docs/Architecture_Report.md
          # Neural Network Project - Engineering Report
          
          ## 1. Linear Algebra Core (Matrix class)
          The system is powered by a custom Matrix engine. 
          - **Efficiency**: Implements Move Semantics (O(1)) and deep copy logic.
          - **Math Operations**: Optimized multiplication, Hadamard products, and ReLU derivatives.
          
          ## 2. Neural Architecture (Layer class)
          Each layer manages weights and biases for signal processing.
          - **Initialization**: Xavier/He initialization (1/sqrt) for stability.
          - **Activation**: Integrated ReLU processing.
          
          ## 3. High-Level Orchestration (Network class)
          The top-level orchestrator for the AI model.
          EOF

      - name: Create Professional PDF
        run: |
          pandoc docs/Architecture_Report.md -o docs/Project_Technical_Docs.pdf

      - name: Push to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/Project_Technical_Docs.pdf
          git commit -m "Update technical PDF (Fix: Missing LaTeX fonts)" || echo "No changes"
          git push
